<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>3D GLB Model Viewer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #111;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .back-link {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      background: rgba(0, 170, 255, 0.2);
      padding: 10px 20px;
      border-radius: 50px;
      backdrop-filter: blur(5px);
      border: 1px solid rgba(0, 170, 255, 0.3);
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-link:hover {
      background: rgba(0, 170, 255, 0.4);
    }

    .ui-layer {
      position: absolute;
      z-index: 10;
      padding: 90px 32px 32px;
      pointer-events: none;
      width: 100%;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
      color: #00aaff;
      text-shadow: 0 2px 10px rgba(0, 170, 255, 0.5);
    }

    h2 {
      margin: 8px 0 0;
      font-weight: 300;
      font-size: 1.2rem;
      color: #ccc;
    }

    .upload-area {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      background: rgba(0, 0, 0, 0.7);
      border: 2px dashed #00aaff;
      padding: 4rem;
      text-align: center;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      cursor: pointer;
      transition: 0.3s;
      pointer-events: auto;
    }

    .upload-area:hover,
    .upload-area.dragover {
      background: rgba(0, 170, 255, 0.1);
      border-color: #fff;
      transform: translate(-50%, -50%) scale(1.05);
    }

    .upload-area h3 {
      margin: 0 0 1rem;
      font-size: 2rem;
    }

    .upload-area p {
      margin: 0;
      color: #ccc;
    }

    #loading {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      font-size: 2rem;
      color: #00aaff;
      pointer-events: none;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 2rem;
      }

      h2 {
        font-size: 1rem;
      }

      .upload-area {
        width: 86%;
        padding: 2.5rem 1.5rem;
      }

      .upload-area h3 {
        font-size: 1.5rem;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>

<body>
  <a href="/" class="back-link">
    <span>←</span> Späť na portál
  </a>

  <div class="ui-layer">
    <h1>3D GLB Model Viewer</h1>
    <h2>Nahraj vlastný .glb model na vizualizáciu</h2>
  </div>

  <div class="upload-area" id="drop-zone">
    <h3>📦 Nahraj .glb model</h3>
    <p>Potiahni sem súbor alebo klikni pre výber.</p>
    <input type="file" id="file-input" accept=".glb" style="display: none;" />
  </div>

  <div id="loading">Načítavam 3D model...</div>
  <div id="canvas-container"></div>

  <script>
    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-input");
    const loading = document.getElementById("loading");
    const container = document.getElementById("canvas-container");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a24);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7.5);
    scene.add(dirLight);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 2, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    let currentWrapper = null;

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    dropZone.addEventListener("click", () => {
      fileInput.click();
    });

    ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) => {
      dropZone.addEventListener(eventName, preventDefaults);
    });

    function preventDefaults(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    dropZone.addEventListener("dragover", () => {
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (event) => {
      dropZone.classList.remove("dragover");
      handleFiles(event.dataTransfer.files);
    });

    fileInput.addEventListener("change", function () {
      handleFiles(this.files);
    });

    function handleFiles(files) {
      if (!files || files.length === 0) return;

      const file = files[0];

      if (!file.name.toLowerCase().endsWith(".glb")) {
        alert("Prosím nahraj súbor vo formáte .glb");
        return;
      }

      dropZone.style.display = "none";
      loading.style.display = "block";

      const reader = new FileReader();

      reader.onload = function (event) {
        loadGLB(event.target.result);
      };

      reader.onerror = function () {
        alert("Nepodarilo sa načítať súbor.");
        loading.style.display = "none";
        dropZone.style.display = "block";
      };

      reader.readAsArrayBuffer(file);
    }

    function loadGLB(arrayBuffer) {
      const loader = new THREE.GLTFLoader();

      loader.parse(
        arrayBuffer,
        "",
        function (gltf) {
          if (currentWrapper) {
            scene.remove(currentWrapper);
          }

          const model = gltf.scene;

          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = maxDim > 0 ? 3 / maxDim : 1;

          model.position.x = -center.x;
          model.position.y = -center.y;
          model.position.z = -center.z;
          model.scale.setScalar(scale);

          currentWrapper = new THREE.Group();
          currentWrapper.add(model);
          scene.add(currentWrapper);

          controls.reset();
          camera.position.set(0, 2, 5);
          camera.lookAt(0, 0, 0);

          loading.style.display = "none";
        },
        function (error) {
          console.error(error);
          alert("Nepodarilo sa načítať 3D model.");
          loading.style.display = "none";
          dropZone.style.display = "block";
        }
      );
    }
  </script>
</body>
</html>
